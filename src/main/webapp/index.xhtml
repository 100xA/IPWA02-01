<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
<h:head>
    <title>#{msg['app.title']}</title>
    <h:outputStylesheet library="css" name="app.css"/>
</h:head>
<h:body>
    <main class="container">
        <h1>#{msg['app.title']}</h1>
        <p class="lead">
            #{msg['app.lead']}
        </p>

        <h:messages globalOnly="true" showSummary="false" showDetail="true" styleClass="messages"/>

        <section class="card">
            <h2>#{msg['nav.actions']}</h2>
            <div class="actions">
                <h:link outcome="report-net" value="#{msg['nav.reportNet']}" styleClass="button"/>
                <h:link outcome="open-nets" value="#{msg['nav.openNets']}" styleClass="button"/>
                <h:link outcome="my-recoveries" value="#{msg['nav.myRecoveries']}" styleClass="button"/>
            </div>
        </section>

    </main>
</h:body>
</html>
